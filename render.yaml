services:
  - type: web
    name: nivas-ai
    env: node
    plan: free
    buildCommand: npm run install-all && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: nivas-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: nivas-redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: VITE_API_BASE_URL
        value: /api

databases:
  - name: nivas-db
    plan: free

redis:
  - name: nivas-redis
    plan: free
    status: enabled
